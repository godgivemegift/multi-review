name: desktop-release

# 三种触发,跨平台打包 Electron 桌面应用(matrix linux/mac/win → electron-builder):
#   ① push 到 main    → 构建并覆盖滚动的 `nightly` 预发布(固定下载地址、免登录、零管理,给高速迭代用)。
#   ② 手动 dispatch   → 只构建、传 artifacts(可选平台),不动任何 Release。
#   ③ push desktop-v* → 汇总所有产物建一个正式的草稿 GitHub Release。
on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        type: choice
        required: false
        default: "all"
        options:
          - all
          - linux
          - mac
          - win
  push:
    branches:
      - main
    tags:
      - "desktop-v*"

# 同一 ref 的旧构建被新 push 取代时取消(main 上高速迭代不排队;不同 tag/ref 互不影响)。
concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

# 默认最小权限；只有发 Release 的 job 需要写。
permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix: ${{ fromJson((github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all') && '{"include":[{"os":"ubuntu-latest","platform":"linux"},{"os":"macos-latest","platform":"mac"},{"os":"windows-latest","platform":"win"}]}' || github.event.inputs.platform == 'linux' && '{"include":[{"os":"ubuntu-latest","platform":"linux"}]}' || github.event.inputs.platform == 'mac' && '{"include":[{"os":"macos-latest","platform":"mac"}]}' || '{"include":[{"os":"windows-latest","platform":"win"}]}') }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package desktop
        shell: bash
        env:
          # 没有 Apple Developer 证书 → 不做 mac 代码签名(跳过证书自动发现)
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          # nuxt build(node-server 产物)+ 按 Electron ABI 替换 better-sqlite3 二进制
          pnpm electron:build
          pnpm exec electron-builder --${{ matrix.platform }} --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          # 只上传可分发文件,不要中间产物
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: warn
          # 手动构建留 1 天;tag 构建留 30 天(产物同时已进 GitHub Release,这里只是中间件备份)。
          # 注意:GitHub Actions 表达式里 0 是 falsy,`'tag' && 0 || 1` 会恒为 1 —— 用非 0 值。
          retention-days: ${{ github.ref_type == 'tag' && 30 || 1 }}

  # 推 desktop-v* tag 时,把三平台产物汇总成一个 GitHub Release。
  # 只在 tag push 上跑:手动 workflow_dispatch 即使选了某个 tag ref 也可能只构建单平台,
  # 那样发出的 Release 会缺平台,所以这里同时要求 event_name == 'push'。
  release:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist-artifacts/**/*

  # push 到 main 时,把三平台产物覆盖到滚动的 `nightly` 预发布上。
  # 每次先删旧 release+tag 再重建 → 资产永远干净(哪怕以后 version 变了也不留旧文件)。
  # 固定下载地址:github.com/<repo>/releases/tag/nightly(公开仓库免登录直下)。
  nightly:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Publish rolling nightly pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # merge-multiple 把产物拍平进 dist-artifacts/;用 find 收集(不靠 shell glob,任何层级都稳)。
          mapfile -t assets < <(find dist-artifacts -type f)
          if [ "${#assets[@]}" -eq 0 ]; then echo "no build artifacts found" >&2; exit 1; fi
          # 删掉旧的 nightly release 和它的 tag(首次没有 → 忽略失败)。
          gh release delete nightly --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
          # 在本次合并的 commit 上重建。标记 prerelease,不会顶替以后的正式 Release。
          gh release create nightly \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "Nightly (main)" \
            --notes "Rolling build from the latest \`main\` (${GITHUB_SHA:0:7}). Overwritten on every merge — not a versioned release. macOS/Windows builds are unsigned; you may need to bypass Gatekeeper/SmartScreen on first launch." \
            "${assets[@]}"
